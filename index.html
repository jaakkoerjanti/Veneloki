<!DOCTYPE html>
<html lang="fi">
<head>

<title>Aquador 28C — Reittipäiväkirja</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: linear-gradient(160deg,#0B1E2D,#0F2940,#0B1E2D); min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #E8EFF5; font-size: 16px; }
input, textarea, button, select { font-family: inherit; font-size: 16px; }
.header { background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(74,144,184,0.2); padding: 12px 16px; display: block; position: sticky; top: 0; z-index: 10; backdrop-filter: blur(10px); }
.header-title { font-size: 17px; font-weight: 700; }
.header-edit { font-size: 12px; color: #4A90B8; opacity: 0.7; }
.header-sub { font-size: 11px; color: #4A90B8; letter-spacing: 1px; }
.header-topline { display: flex; align-items: flex-start; }
.header-id { cursor: pointer; }
.header-right { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; padding-left: 10px; }
.fuel-mini { margin-top: 12px; cursor: pointer; }
.fuel-mini-top { display: flex; align-items: baseline; gap: 6px; }
.fuel-mini-l { font-size: 30px; font-weight: 800; line-height: 1; }
.fuel-mini-u { font-size: 14px; font-weight: 700; color: #7A9AB5; }
.fuel-mini-cap { font-size: 12px; color: #7A9AB5; }
.fuel-mini-pct { margin-left: auto; font-size: 15px; font-weight: 700; }
.fuel-mini-bar-bg { background: rgba(255,255,255,0.07); border-radius: 6px; height: 10px; overflow: hidden; margin: 8px 0 6px; }
.fuel-mini-bar { height: 100%; border-radius: 6px; transition: width .4s; }
.fuel-mini-sub { font-size: 11px; color: #7A9AB5; }
.fuel-pill { border-radius: 20px; padding: 7px 14px; display: flex; gap: 8px; align-items: center; cursor: pointer; background: rgba(255,255,255,0.05); border: 1px solid rgba(74,144,184,0.3); }
.fuel-dot { width: 10px; height: 10px; border-radius: 50%; }
.fuel-val { font-size: 15px; font-weight: 700; }
.fuel-pct { font-size: 12px; color: #7A9AB5; }
.mh-label { font-size: 12px; color: #4A90B8; margin-top: 4px; }
.boat-img { height: 44px; width: auto; display: block; border-radius: 8px; border: 1px solid rgba(74,144,184,0.35); object-fit: cover; }
.fuel-panel { margin: 10px 14px; background: rgba(74,144,184,0.08); border: 1px solid rgba(74,144,184,0.2); border-radius: 12px; padding: 16px; }
.tabs { display: flex; margin: 10px 14px; background: rgba(255,255,255,0.04); border-radius: 10px; border: 1px solid rgba(74,144,184,0.15); overflow: hidden; }
.tab { flex: 1; padding: 12px 4px; border: none; cursor: pointer; font-size: 14px; background: transparent; color: #7A9AB5; border-right: 1px solid rgba(74,144,184,0.15); }
.tab:last-child { border-right: none; }
.tab.active { background: rgba(74,144,184,0.25); color: #4A90B8; font-weight: 700; }
.content { padding: 0 14px 40px; }
.card { background: rgba(255,255,255,0.04); border: 1px solid rgba(74,144,184,0.15); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.leg-date { font-size: 12px; color: #4A90B8; }
.leg-mh { font-size: 12px; color: #4A90B8; background: rgba(74,144,184,0.15); padding: 2px 10px; border-radius: 10px; }
.leg-route { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
.leg-from, .leg-to { font-size: 20px; font-weight: 700; }
.leg-line { flex: 1; border-top: 1px dashed rgba(74,144,184,0.3); text-align: center; line-height: 0; font-size: 16px; }
.leg-stats { display: flex; gap: 8px; }
.stat-box { flex: 1; background: rgba(74,144,184,0.08); border-radius: 8px; padding: 10px 6px; text-align: center; }
.stat-label { font-size: 11px; color: #7A9AB5; }
.stat-val { font-size: 15px; font-weight: 700; margin-top: 3px; }
.leg-notes { margin-top: 10px; font-size: 13px; color: #7A9AB5; font-style: italic; background: rgba(255,255,255,0.03); border-radius: 6px; padding: 10px; }
.btn-edit { background: none; border: none; color: #4A90B8; cursor: pointer; font-size: 18px; padding: 4px 6px; }
.btn-del { background: none; border: none; color: #E74C3C; cursor: pointer; font-size: 18px; padding: 4px 6px; }
label { font-size: 12px; color: #7A9AB5; letter-spacing: 0.5px; text-transform: uppercase; display: block; margin-bottom: 6px; margin-top: 14px; }
label:first-child { margin-top: 0; }
input[type=text], input[type=date], input[type=number], textarea {
  display: block; width: 100%; background: rgba(255,255,255,0.07); border: 1px solid rgba(74,144,184,0.35); border-radius: 8px; padding: 13px 14px; color: #E8EFF5; font-size: 17px; outline: none; color-scheme: dark;
}
textarea { resize: vertical; }
input:focus, textarea:focus { border-color: #4A90B8; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.preview-box { background: rgba(74,144,184,0.08); border: 1px solid rgba(74,144,184,0.2); border-radius: 8px; padding: 14px; margin-top: 14px; }
.preview-row { display: flex; gap: 8px; }
.preview-item { flex: 1; text-align: center; }

.preview-after { font-size: 13px; color: #7A9AB5; text-align: center; margin-top: 10px; }
.errmsg { background: rgba(231,76,60,0.15); border: 1px solid rgba(231,76,60,0.4); border-radius: 8px; padding: 12px 14px; font-size: 14px; color: #E74C3C; margin-top: 14px; }
.btn-save { width: 100%; padding: 18px; background: #2ECC71; border: none; border-radius: 10px; color: #0B1E2D; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 16px; }
.btn-blue { background: #4A90B8; border: none; border-radius: 8px; padding: 12px 18px; color: #fff; font-weight: 700; cursor: pointer; font-size: 16px; }
.btn-green { background: rgba(46,204,113,0.15); border: 1px solid rgba(46,204,113,0.4); border-radius: 8px; padding: 12px; color: #2ECC71; font-weight: 700; cursor: pointer; font-size: 15px; flex: 1; }
.btn-set { background: rgba(74,144,184,0.15); border: 1px solid rgba(74,144,184,0.4); border-radius: 8px; padding: 12px; color: #4A90B8; font-weight: 700; cursor: pointer; font-size: 15px; flex: 1; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.big-stat { text-align: center; }
.big-stat-icon { font-size: 26px; margin-bottom: 4px; }
.big-stat-lbl { font-size: 12px; color: #7A9AB5; }
.big-stat-val { font-size: 22px; font-weight: 700; margin-top: 3px; }
.kv-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(74,144,184,0.1); }
.kv-lbl { font-size: 14px; color: #7A9AB5; }
.kv-val { font-size: 14px; font-weight: 700; }
.duration-box { background: rgba(74,144,184,0.08); border: 1px solid rgba(74,144,184,0.15); border-radius: 8px; padding: 12px 14px; margin-top: 6px; }
.duration-txt { font-size: 16px; font-weight: 700; color: #E8EFF5; }
.duration-sub { font-size: 13px; color: #7A9AB5; margin-top: 2px; }
.empty { text-align: center; padding: 60px 0; color: #4A90B8; opacity: .5; }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.hidden { display: none; }
.flex-row { display: flex; gap: 8px; align-items: center; }
.fuel-bar-bg { background: rgba(255,255,255,0.06); border-radius: 6px; height: 12px; overflow: hidden; margin-top: 8px; }
.fuel-bar { height: 100%; border-radius: 6px; transition: width .4s; }
.section-title { font-size: 12px; color: #7A9AB5; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
/* Polttoaine-hero (loki) */
.fuel-hero { background: rgba(74,144,184,0.10); border: 1px solid rgba(74,144,184,0.28); border-radius: 14px; padding: 16px 16px 14px; margin-bottom: 14px; cursor: pointer; }
.fuel-hero-top { display: flex; align-items: baseline; gap: 8px; }
.fuel-hero-l { font-size: 48px; font-weight: 800; line-height: 0.95; }
.fuel-hero-unit { font-size: 18px; font-weight: 700; color: #7A9AB5; }
.fuel-hero-pct { margin-left: auto; font-size: 17px; font-weight: 700; align-self: flex-end; }
.fuel-hero-cap { font-size: 12px; color: #7A9AB5; align-self: flex-end; margin-left: 2px; }
.fuel-hero-bar-bg { background: rgba(255,255,255,0.07); border-radius: 7px; height: 14px; overflow: hidden; margin: 12px 0 14px; }
.fuel-hero-bar { height: 100%; border-radius: 7px; transition: width .4s; }
.fuel-hero-sub { display: flex; gap: 10px; }
.fuel-hero-metric { flex: 1; background: rgba(255,255,255,0.04); border-radius: 10px; padding: 10px 8px; text-align: center; }
.fuel-hero-metric-val { font-size: 24px; font-weight: 800; }
.fuel-hero-metric-lbl { font-size: 11px; color: #7A9AB5; margin-top: 2px; }
.fuel-hero-hint { font-size: 11px; color: #4A90B8; text-align: center; margin-top: 10px; opacity: .8; }
/* Tiivis etappilista (loki) */
.leg { background: rgba(255,255,255,0.04); border: 1px solid rgba(74,144,184,0.15); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; }
.leg-head { display: flex; align-items: center; gap: 8px; }
.leg-route2 { font-size: 16px; font-weight: 700; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.leg-d { font-size: 11px; color: #4A90B8; white-space: nowrap; }
.leg-acts { display: flex; gap: 0; flex-shrink: 0; }
.leg-acts button { font-size: 15px; padding: 2px 5px; }
.leg-meta { display: flex; flex-wrap: wrap; gap: 3px 14px; margin-top: 6px; font-size: 12.5px; color: #7A9AB5; }
.leg-meta b { color: #E8EFF5; font-weight: 700; }
.leg-note2 { margin-top: 6px; font-size: 12px; color: #7A9AB5; font-style: italic; }
/* Tankkausloki */
.fuelrow { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid rgba(74,144,184,0.1); }
.fuelrow:last-child { border-bottom: none; }
.fuelrow-date { font-size: 14px; font-weight: 700; }
.fuelrow-sub { font-size: 12px; color: #7A9AB5; margin-top: 2px; }
.fuelrow-l { font-size: 15px; font-weight: 700; color: #4A90B8; }
.fuelrow-tot { font-size: 12px; color: #7A9AB5; margin-top: 2px; }
.fuelrow .btn-del { font-size: 16px; padding: 4px 6px; }
.btn-close { background: rgba(255,255,255,0.06); border: 1px solid rgba(74,144,184,0.3); border-radius: 8px; padding: 7px 12px; color: #7A9AB5; font-size: 13px; font-weight: 700; cursor: pointer; }
.btn-cancel { width: 100%; padding: 14px; background: transparent; border: 1px solid rgba(74,144,184,0.3); border-radius: 10px; color: #7A9AB5; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }
.btn-fuel-action { width: 100%; padding: 13px; margin-bottom: 14px; background: rgba(74,144,184,0.12); border: 1px solid rgba(74,144,184,0.35); border-radius: 12px; color: #4A90B8; font-size: 15px; font-weight: 700; cursor: pointer; }
.fuelcard { border-color: rgba(46,204,113,0.4); background: rgba(46,204,113,0.08); }
.fuelcard .leg-route2 { color: #2ECC71; }
</style>
</head>
<body>

<div id="app"></div>

<script>
let TANK = 350;
const DEF_CONS = 25;

const HIST = [
  {id:"h1",date:"2025-01-01",from:"Jurmo",to:"Korpoström",mhStart:"534.1",mhEnd:"535.9",nm:"",notes:"Tankattu 132L ennen lähtöä",fuelManual:""},
  {id:"h2",date:"2025-01-01",from:"Korpoström",to:"?",mhStart:"535.9",mhEnd:"537.6",nm:"",notes:"",fuelManual:""},
  {id:"h3",date:"2025-01-01",from:"?",to:"Merimasku",mhStart:"537.6",mhEnd:"539.5",nm:"",notes:"Tankattu 123L, kulutus 25L/h",fuelManual:""},
  {id:"h4",date:"2025-01-01",from:"Naantali",to:"?",mhStart:"539.6",mhEnd:"542.9",nm:"",notes:"Lähtö 13:00. Tankkaus 38L",fuelManual:""},
  {id:"h5",date:"2025-01-01",from:"?",to:"Isokari",mhStart:"542.9",mhEnd:"545.6",nm:"",notes:"",fuelManual:""},
  {id:"h6",date:"2025-01-01",from:"Isokari",to:"Uusikaupunki",mhStart:"545.6",mhEnd:"546.9",nm:"",notes:"",fuelManual:""},
  {id:"h7",date:"2025-01-01",from:"Uusikaupunki",to:"Katanpää",mhStart:"546.9",mhEnd:"547.6",nm:"",notes:"",fuelManual:""},
  {id:"h8",date:"2025-01-01",from:"Katanpää",to:"Merimasku",mhStart:"547.6",mhEnd:"549.5",nm:"",notes:"Tankattu 154L, 6.6h, 23.3L/h",fuelManual:""},
  {id:"h9",date:"2025-01-01",from:"Merimasku",to:"Naantali",mhStart:"549.6",mhEnd:"550.5",nm:"",notes:"",fuelManual:""},
  {id:"h10",date:"2025-01-01",from:"Naantali",to:"Gulvivan",mhStart:"550.5",mhEnd:"551.5",nm:"",notes:"",fuelManual:""},
  {id:"h11",date:"2025-01-01",from:"Gulvivan",to:"Mossala",mhStart:"551.5",mhEnd:"552.5",nm:"",notes:"",fuelManual:""},
  {id:"h12",date:"2025-01-01",from:"Mossala",to:"Houtskari Näsby",mhStart:"552.5",mhEnd:"553.5",nm:"",notes:"",fuelManual:""},
  {id:"h13",date:"2025-01-01",from:"Houtskari Näsby",to:"Merimasku",mhStart:"553.5",mhEnd:"554.5",nm:"",notes:"",fuelManual:""},
  {id:"h14",date:"2025-01-01",from:"Merimasku",to:"Naantali",mhStart:"554.5",mhEnd:"555.6",nm:"",notes:"Tankkaus 146L, 6h, 24L/h",fuelManual:""},
  {id:"h15",date:"2025-01-01",from:"Naantali",to:"Damskär",mhStart:"558.8",mhEnd:"561.0",nm:"",notes:"",fuelManual:""},
  {id:"h16",date:"2025-01-01",from:"Damskär",to:"Lappo",mhStart:"561.0",mhEnd:"561.5",nm:"",notes:"Tankattu 113L, 6.2h, 18.2L/h",fuelManual:""},
  {id:"h17",date:"2025-01-01",from:"Lappo",to:"Glada Lax Kumlinge",mhStart:"561.5",mhEnd:"562.5",nm:"",notes:"",fuelManual:""},
  {id:"h18",date:"2025-01-01",from:"Glada Lax Kumlinge",to:"Sottunga",mhStart:"562.5",mhEnd:"563.5",nm:"",notes:"",fuelManual:""},
  {id:"h19",date:"2025-01-01",from:"Sottunga",to:"Kökar Brudhel",mhStart:"563.5",mhEnd:"564.9",nm:"",notes:"",fuelManual:""},
  {id:"h20",date:"2025-01-01",from:"Kökar",to:"Naantali",mhStart:"565.1",mhEnd:"568.1",nm:"",notes:"",fuelManual:""},
  {id:"h21",date:"2025-01-01",from:"Naantali",to:"Pensar",mhStart:"568.1",mhEnd:"569.3",nm:"",notes:"",fuelManual:""},
  {id:"h22",date:"2025-01-01",from:"Pensar",to:"Naantali",mhStart:"569.3",mhEnd:"570.9",nm:"",notes:"",fuelManual:""},
  {id:"h23",date:"2025-01-01",from:"Naantali",to:"Naantali",mhStart:"570.9",mhEnd:"572.2",nm:"",notes:"",fuelManual:""},
  {id:"h24",date:"2025-01-01",from:"Naantali",to:"Merimasku",mhStart:"572.2",mhEnd:"572.6",nm:"",notes:"",fuelManual:""},
  {id:"h25",date:"2025-05-13",from:"Merimasku",to:"Saarimökki",mhStart:"572.7",mhEnd:"573.7",nm:"",notes:"Tankattu 203.42L (500€)",fuelManual:""},
  {id:"h26",date:"2025-05-13",from:"Saarimökki",to:"Naantali",mhStart:"573.7",mhEnd:"574.4",nm:"",notes:"",fuelManual:""},
  {id:"h27",date:"2025-05-13",from:"Naantali",to:"Pensar",mhStart:"574.4",mhEnd:"576.0",nm:"",notes:"",fuelManual:""},
  {id:"h28",date:"2025-05-13",from:"Pensar",to:"Vepsä",mhStart:"576.0",mhEnd:"578.2",nm:"",notes:"8kn hidas ajo",fuelManual:""},
  {id:"h29",date:"2025-05-13",from:"Vepsä",to:"Naantali",mhStart:"578.2",mhEnd:"578.8",nm:"",notes:"",fuelManual:""},
  {id:"h30",date:"2025-05-13",from:"Naantali",to:"Sattmark",mhStart:"578.8",mhEnd:"580.0",nm:"",notes:"",fuelManual:""},
  {id:"h31",date:"2025-05-13",from:"Sattmark",to:"Ruissalo",mhStart:"580.0",mhEnd:"581.5",nm:"",notes:"",fuelManual:""},
  {id:"h32",date:"2025-05-13",from:"Ruissalo",to:"Naantali",mhStart:"581.5",mhEnd:"582.5",nm:"",notes:"",fuelManual:""},
  {id:"h33",date:"2026-06-14",from:"Naantali",to:"Nauvo",mhStart:"584.0",mhEnd:"586.2",nm:"",notes:"Hidasta ajoa",fuelManual:""},
];

// State
let legs = [], fuelings = [], fuel = 100, cons = DEF_CONS, tab = "loki", editId = null, showFuel = false, showSettings = false;
let cfg = { title: "Aquador 28C", subtitle: "Reittipäiväkirja", tank: 350 };

function load() {
  try { const v = localStorage.getItem("vl5-legs"); if(v) legs = JSON.parse(v); else legs = JSON.parse(JSON.stringify(HIST)); } catch { legs = JSON.parse(JSON.stringify(HIST)); }
  try { const v = localStorage.getItem("vl5-fuel"); if(v) fuel = parseFloat(v); } catch {}
  try { const v = localStorage.getItem("vl5-cons"); if(v) cons = parseFloat(v); } catch {}
  try { const v = localStorage.getItem("vl5-fuelings"); if(v) fuelings = JSON.parse(v); } catch {}
  try { const v = localStorage.getItem("vl5-cfg"); if(v) cfg = Object.assign(cfg, JSON.parse(v)); } catch {}
  TANK = parseNum(cfg.tank) || 350;
}

function persist() {
  try { localStorage.setItem("vl5-legs", JSON.stringify(legs)); } catch {}
  try { localStorage.setItem("vl5-fuel", String(fuel)); } catch {}
  try { localStorage.setItem("vl5-cons", String(cons)); } catch {}
  try { localStorage.setItem("vl5-fuelings", JSON.stringify(fuelings)); } catch {}
  try { localStorage.setItem("vl5-cfg", JSON.stringify(cfg)); } catch {}
}

function parseNum(s) { return parseFloat(String(s||"").replace(",",".").trim()) || 0; }
function esc(s) { return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function getH(s,e) { const h = parseNum(e)-parseNum(s); return h>0?h:0; }
function legH(l) { return getH(l.mhStart, l.mhEnd); }
function legF(l) { const rate = l.fuelManual ? parseFloat(l.fuelManual) : cons; return Math.round(legH(l)*rate*10)/10; }
function legN(l) { return l.nm ? parseFloat(l.nm) : Math.round(legH(l)*25*10)/10; }
function dur(h) { const hh=Math.floor(h), mm=Math.round((h-hh)*60); if(hh===0)return mm+"min"; if(mm===0)return hh+"h"; return hh+"h "+mm+"min"; }
function fuelColor(pct) { return pct>50?"#2ECC71":pct>25?"#F39C12":"#E74C3C"; }
function latestMh() { return legs.reduce((s,l)=>Math.max(s,parseNum(l.mhEnd)),0); }
function totalH() { return legs.reduce((s,l)=>s+legH(l),0); }
function totalNm() { return legs.reduce((s,l)=>s+legN(l),0); }
function fuelPct() { return Math.min(100,Math.max(0,fuel/TANK*100)); }
function lastLeg() { return legs.length>0?legs[legs.length-1]:null; }
function itemKey(date, sub) { const t = Date.parse((date||"")+"T00:00:00"); return (isNaN(t)?0:t) + (sub||0); }

function render() {
  const pct = fuelPct();
  const fc = fuelColor(pct);
  const lmh = latestMh();

  let html = `
  <div class="header">
    <div class="header-topline">
      <div class="header-id" onclick="openSettings()">
        <div class="header-title">${esc(cfg.title)} <span class="header-edit">✎</span></div>
        <div class="header-sub">${esc(cfg.subtitle)}</div>
      </div>
      <div class="header-right">
        <img class="boat-img" src="./aquador.png" alt="${esc(cfg.title)}">
        <div class="mh-label">⏱ ${lmh.toFixed(1)} h</div>
      </div>
    </div>
    <div class="fuel-mini" onclick="toggleFuel()">
      <div class="fuel-mini-top">
        <span class="fuel-mini-l" style="color:${fc}">${Math.round(fuel)}</span>
        <span class="fuel-mini-u">L</span>
        <span class="fuel-mini-cap">/ ${TANK} L</span>
        <span class="fuel-mini-pct" style="color:${fc}">${Math.round(pct)}%</span>
      </div>
      <div class="fuel-mini-bar-bg"><div class="fuel-mini-bar" style="width:${pct}%;background:linear-gradient(90deg,${fc}88,${fc})"></div></div>
      <div class="fuel-mini-sub">≈ ${(fuel/cons).toFixed(1)} h ajoaikaa · ${Math.round(fuel/cons*25)} nm jäljellä &nbsp;·&nbsp; ⛽ näpäytä: tankkaus</div>
    </div>
  </div>`;

  // Asetuspaneeli (veneen tiedot) headerin alle
  if(showSettings) {
    html += `
    <div class="fuel-panel">
      <div style="display:flex;align-items:center;margin-bottom:12px">
        <div style="font-size:14px;font-weight:700;color:#4A90B8">⚙️ Veneen tiedot</div>
        <button class="btn-close" style="margin-left:auto" onclick="closeSettings()">✕ Sulje</button>
      </div>
      <label>Veneen nimi</label>
      <input type="text" id="setTitle" value="${esc(cfg.title)}" placeholder="esim. Aquador 28C">
      <label>Alaotsikko</label>
      <input type="text" id="setSub" value="${esc(cfg.subtitle)}" placeholder="esim. Reittipäiväkirja">
      <label>Tankin koko (L)</label>
      <input type="text" inputmode="decimal" id="setTank" value="${TANK}" placeholder="esim. 350">
      <button class="btn-save" style="margin-top:14px" onclick="saveSettings()">💾 Tallenna</button>
      <button class="btn-cancel" onclick="closeSettings()">Peruuta</button>
    </div>`;
  }

  // Tankkauspaneeli headerin alle
  if(showFuel) {
    html += `
    <div class="fuel-panel">
      <div style="display:flex;align-items:center;margin-bottom:12px">
        <div style="font-size:14px;font-weight:700;color:#4A90B8">⛽ Kirjaa tankkaus</div>
        <button class="btn-close" style="margin-left:auto" onclick="toggleFuel()">✕ Sulje</button>
      </div>
      <label>Päivämäärä</label>
      <input type="date" id="fkDate" value="${new Date().toISOString().slice(0,10)}">
      <div class="grid2">
        <div><label>Litraa</label><input type="text" inputmode="decimal" id="fkL" placeholder="esim. 150"></div>
        <div><label>Mittari (h)</label><input type="text" inputmode="decimal" id="fkMh" value="${lmh.toFixed(1)}" placeholder="esim. ${lmh.toFixed(1)}"></div>
      </div>
      <div class="grid2">
        <div><label>Hinta €/L</label><input type="text" inputmode="decimal" id="fkPpl" placeholder="esim. 1.95"></div>
        <div><label>Yhteensä €</label><input type="text" inputmode="decimal" id="fkTot" placeholder="esim. 292.50"></div>
      </div>
      <div id="fkHint" style="font-size:12px;color:#7A9AB5;margin-top:8px">Täytä litrat ja joko €/L tai yhteensä €.</div>
      <button class="btn-save" style="margin-top:12px" onclick="logFueling()">💾 Tallenna tankkaus</button>
      <div style="border-top:1px solid rgba(74,144,184,0.18);margin:16px 0 10px"></div>
      <div style="font-size:12px;color:#7A9AB5;margin-bottom:8px">Korjaa tankin taso (ei kirjata tankkaukseksi)</div>
      <div class="flex-row">
        <input type="text" inputmode="decimal" id="addFuelInp" placeholder="Litraa" style="flex:1;background:rgba(255,255,255,0.07);border:1px solid rgba(74,144,184,0.35);border-radius:8px;padding:12px;color:#E8EFF5;font-size:16px;color-scheme:dark">
        <button class="btn-set" onclick="setFuelDirect()">📍 Aseta</button>
        <button class="btn-green" onclick="setFuelFull()">⛽ Täysi</button>
      </div>
      <button class="btn-cancel" onclick="toggleFuel()">Peruuta</button>
    </div>`;
  }

  html += `
  <div class="tabs">
    <button class="tab ${tab==='loki'?'active':''}" onclick="setTab('loki')">📋 Loki</button>
    <button class="tab ${tab==='uusi'?'active':''}" onclick="setTab('uusi')">➕ Uusi</button>
    <button class="tab ${tab==='tilasto'?'active':''}" onclick="setTab('tilasto')">📊 Tilastot</button>
  </div>
  <div class="content">`;

  if(tab==="loki") {
    // Yhdistetty aikajana: etapit + tankkaukset, järjestys käyntiajan (mittarilukeman) mukaan, uusin ensin
    const items = [];
    legs.forEach(l => items.push({t:"leg", d:l, k:parseNum(l.mhEnd)}));
    fuelings.forEach(f => items.push({t:"fuel", d:f, k:(f.mh?parseNum(f.mh):lmh)+0.001}));
    items.sort((a,b)=> b.k - a.k);

    if(items.length===0) {
      html += `<div class="empty"><div class="empty-icon">⚓</div><div>Ei merkintöjä vielä</div></div>`;
    } else {
      items.forEach(it => {
        if(it.t==="leg") {
          const leg=it.d, h=legH(leg), f=legF(leg), n=legN(leg);
          html += `
          <div class="leg">
            <div class="leg-head">
              <span class="leg-route2">${leg.from} → ${leg.to}</span>
              <span class="leg-d">${leg.date}</span>
              <span class="leg-acts">
                <button class="btn-edit" onclick="editLeg('${leg.id}')">✏️</button>
                <button class="btn-del" onclick="deleteLeg('${leg.id}')">✕</button>
              </span>
            </div>
            <div class="leg-meta">
              <span>⏱ <b>${dur(h)}</b></span>
              <span>⛽ <b>${f} L</b></span>
              <span>🧭 <b>${n} nm</b>${leg.nm?'':' <span style="opacity:.6">(arvio)</span>'}</span>
              <span>⚙ <b>${leg.mhStart}–${leg.mhEnd}</b></span>
            </div>
            ${leg.notes?`<div class="leg-note2">${leg.notes}</div>`:''}
          </div>`;
        } else {
          const f=it.d;
          html += `
          <div class="leg fuelcard">
            <div class="leg-head">
              <span class="leg-route2">⛽ Tankkaus</span>
              <span class="leg-d">${f.date||""}</span>
              <span class="leg-acts">
                <button class="btn-del" onclick="deleteFueling('${f.id}')">✕</button>
              </span>
            </div>
            <div class="leg-meta">
              <span>🛢 <b>${(f.liters||0).toFixed(1)} L</b></span>
              ${f.mh?`<span>⚙ <b>${f.mh} h</b></span>`:''}
              ${f.ppl?`<span><b>${f.ppl.toFixed(3)} €/L</b></span>`:''}
              ${f.total?`<span>💶 <b>${f.total.toFixed(2)} €</b></span>`:''}
            </div>
          </div>`;
        }
      });
    }
  }

  if(tab==="uusi") {
    const ll = editId ? legs.find(l=>l.id===editId) : null;
    const defDate = ll ? ll.date : new Date().toISOString().slice(0,10);
    const defFrom = ll ? ll.from : (lastLeg()?lastLeg().to:"");
    const defTo = ll ? ll.to : "";
    const defMhS = ll ? ll.mhStart : lmh.toFixed(1);
    const defMhE = ll ? ll.mhEnd : "";
    const defNm = ll ? ll.nm : "";
    const defNotes = ll ? ll.notes : "";
    const defFuelM = ll ? (ll.fuelManual||"") : "";

    html += `
    <div class="card" style="padding:20px">
      <div style="font-size:16px;font-weight:700;color:#4A90B8;margin-bottom:16px">${editId?"Muokkaa etappia":"Uusi etappi"}</div>
      <label>Päivämäärä</label>
      <input type="date" id="fDate" value="${defDate}">
      <div class="grid2">
        <div><label>Lähtösatama</label><input type="text" id="fFrom" value="${defFrom}" placeholder="Lähtösatama"></div>
        <div><label>Määräsatama</label><input type="text" id="fTo" value="${defTo}" placeholder="Määräsatama"></div>
      </div>
      <div class="grid2">
        <div><label>Mittari lähtö (h)</label><input type="text" inputmode="decimal" id="fMhS" value="${defMhS}" placeholder="${lmh.toFixed(1)}"></div>
        <div><label>Mittari tulo (h)</label><input type="text" inputmode="decimal" id="fMhE" value="${defMhE}" placeholder="esim. 588.5"></div>
      </div>
      <label>Kulutus L/h (oletus ${cons} L/h)</label>
      <input type="text" inputmode="decimal" id="fFuelM" value="${defFuelM}" placeholder="${cons} L/h (oletus)">
      <div id="durBox" class="hidden"></div>
      <label>Matka Skipposta (nm) — valinnainen</label>
      <input type="text" inputmode="decimal" id="fNm" value="${defNm}" placeholder="Tyhjä = lasketaan automaattisesti">
      <label>Muistiinpanot</label>
      <textarea id="fNotes" rows="3" placeholder="Sää, nähtävyydet, huomiot...">${defNotes}</textarea>
      <div id="previewBox" class="hidden"></div>
      <div id="errMsg" class="hidden errmsg"></div>
      <button class="btn-save" onclick="saveLeg()">💾 ${editId?"Tallenna muutokset":"Tallenna etappi"}</button>
      <button class="btn-cancel" onclick="cancelForm()">Peruuta</button>
    </div>`;
  }

  if(tab==="tilasto") {
    const pct2 = fuelPct();
    const fc2 = fuelColor(pct2);
    const th = totalH(), tn = totalNm(), lm = latestMh();
    html += `
    <div class="card" style="padding:20px;margin-bottom:12px">
      <div class="section-title">Polttoainetilanne</div>
      <div class="flex-row" style="justify-content:space-between;margin-bottom:8px">
        <span style="font-size:32px;font-weight:700;color:${fc2}">${Math.round(fuel)} L</span>
        <span style="font-size:15px;color:#7A9AB5;align-self:flex-end;padding-bottom:4px">/ ${TANK} L</span>
      </div>
      <div class="fuel-bar-bg"><div class="fuel-bar" style="width:${pct2}%;background:linear-gradient(90deg,${fc2}88,${fc2})"></div></div>
    </div>
    <div class="stat-grid">
      <div class="card big-stat" style="margin-bottom:0"><div class="big-stat-icon">⛵</div><div class="big-stat-lbl">Etappeja</div><div class="big-stat-val">${legs.length} kpl</div></div>
      <div class="card big-stat" style="margin-bottom:0"><div class="big-stat-icon">🧭</div><div class="big-stat-lbl">Yhteismatka</div><div class="big-stat-val">${tn.toFixed(0)} nm</div></div>
      <div class="card big-stat" style="margin-bottom:0"><div class="big-stat-icon">⏱️</div><div class="big-stat-lbl">Moottorit.</div><div class="big-stat-val">${th.toFixed(1)} h</div></div>
      <div class="card big-stat" style="margin-bottom:0"><div class="big-stat-icon">⚙️</div><div class="big-stat-lbl">Mittarilukema</div><div class="big-stat-val">${lm.toFixed(1)} h</div></div>
    </div>
    <div class="card" style="margin-top:12px;padding:20px">
      <div class="section-title">Kulutusasetus</div>
      <div class="flex-row">
        <input type="number" step="0.5" value="${cons}" onchange="updateCons(this.value)" style="width:90px;background:rgba(255,255,255,0.07);border:1px solid rgba(74,144,184,0.35);border-radius:8px;padding:12px;color:#E8EFF5;font-size:20px;font-weight:700;text-align:center;color-scheme:dark">
        <span style="font-size:15px;color:#7A9AB5">L/h oletuskulutus</span>
      </div>
    </div>
    <div class="card">
      <div class="section-title">Keskiluvut</div>
      <div class="kv-row"><span class="kv-lbl">Kulutus / tunti</span><span class="kv-val">${cons} L/h</span></div>
      <div class="kv-row"><span class="kv-lbl">Tankilla käyntiaikaa</span><span class="kv-val">~${Math.round(fuel/cons)} h</span></div>
      <div class="kv-row"><span class="kv-lbl">Tankilla matkaa</span><span class="kv-val">~${Math.round(fuel/cons*25)} nm</span></div>
    </div>`;

    // Todellinen kulutus & kustannukset tankkauslokin pohjalta
    const totL = fuelings.reduce((s,f)=>s+(f.liters||0),0);
    const totCost = fuelings.reduce((s,f)=>s+(f.total||0),0);
    const avgPpl = totL>0 && totCost>0 ? totCost/totL : 0;
    const realCons = th>0 && totL>0 ? totL/th : 0;
    const costPerH = th>0 && totCost>0 ? totCost/th : 0;
    const costPerNm = tn>0 && totCost>0 ? totCost/tn : 0;
    html += `
    <div class="card">
      <div class="section-title">Todellinen kulutus & kustannukset</div>`;
    if(fuelings.length===0) {
      html += `<div style="font-size:13px;color:#7A9AB5">Lisää tankkauksia (näpäytä loki-sivun polttoainemittaria), niin näet todellisen kulutuksen ja kustannukset käyntiaikoihin ja matkaan suhteutettuna.</div>`;
    } else {
      html += `
      <div class="kv-row"><span class="kv-lbl">Tankattu yhteensä</span><span class="kv-val">${totL.toFixed(0)} L</span></div>
      <div class="kv-row"><span class="kv-lbl">Maksettu yhteensä</span><span class="kv-val">${totCost>0?totCost.toFixed(2)+" €":"–"}</span></div>
      <div class="kv-row"><span class="kv-lbl">Keskihinta</span><span class="kv-val">${avgPpl>0?avgPpl.toFixed(3)+" €/L":"–"}</span></div>
      <div class="kv-row"><span class="kv-lbl">Todellinen kulutus</span><span class="kv-val" style="color:#4A90B8">${realCons>0?realCons.toFixed(1)+" L/h":"–"}</span></div>
      <div class="kv-row"><span class="kv-lbl">Kulutus / merimaili</span><span class="kv-val">${tn>0&&totL>0?(totL/tn).toFixed(2)+" L/nm":"–"}</span></div>
      <div class="kv-row"><span class="kv-lbl">Kustannus / tunti</span><span class="kv-val">${costPerH>0?costPerH.toFixed(2)+" €/h":"–"}</span></div>
      <div class="kv-row"><span class="kv-lbl">Kustannus / merimaili</span><span class="kv-val">${costPerNm>0?costPerNm.toFixed(2)+" €/nm":"–"}</span></div>
      <div style="font-size:11px;color:#7A9AB5;margin-top:10px">Todellinen kulutus = tankattu yhteensä ÷ käyntitunnit (${th.toFixed(1)} h). Tarkin, kun loki ja tankkaukset kattavat saman jakson.</div>`;
    }
    html += `</div>`;

    // Kulutus tankkausväleistä (litrat ÷ käyntiaika fillien välillä, mittarilukemien perusteella)
    const fv = fuelings.filter(f=>f.mh>0).sort((a,b)=>a.mh-b.mh);
    let lastCons=0, lastBurn=0, lastHrs=0, allCons=0, allBurn=0, allHrs=0;
    if(fv.length>=2) {
      const a=fv[fv.length-2], b=fv[fv.length-1];
      lastHrs = b.mh - a.mh; lastBurn = b.liters||0;
      if(lastHrs>0) lastCons = lastBurn/lastHrs;
      allHrs = fv[fv.length-1].mh - fv[0].mh;
      allBurn = fv.slice(1).reduce((s,f)=>s+(f.liters||0),0);
      if(allHrs>0) allCons = allBurn/allHrs;
    }
    html += `
    <div class="card">
      <div class="section-title">Kulutus tankkausväleistä</div>`;
    if(fv.length<2) {
      html += `<div style="font-size:13px;color:#7A9AB5">Tarvitaan vähintään 2 tankkausta mittarilukemineen. Kulutus lasketaan tankattujen litrojen ja mittarilukemien erotuksesta.</div>`;
    } else {
      html += `
      <div class="kv-row"><span class="kv-lbl">Viim. tankkausväli<br><span style="font-size:11px;opacity:.7">${lastBurn.toFixed(0)} L ÷ ${lastHrs.toFixed(1)} h</span></span><span class="kv-val" style="color:#2ECC71">${lastCons>0?lastCons.toFixed(1)+" L/h":"–"}</span></div>
      <div class="kv-row"><span class="kv-lbl">Kaikki tankkaukset<br><span style="font-size:11px;opacity:.7">${allBurn.toFixed(0)} L ÷ ${allHrs.toFixed(1)} h</span></span><span class="kv-val" style="color:#2ECC71">${allCons>0?allCons.toFixed(1)+" L/h":"–"}</span></div>
      <div style="font-size:11px;color:#7A9AB5;margin-top:10px">Lasketaan tankattujen litrojen ja mittarilukemien erotuksesta. Tarkin, kun tankki täytetään täyteen joka tankkauksella.</div>`;
    }
    html += `</div>`;

    // Tankkausloki
    if(fuelings.length>0) {
      html += `<div class="card"><div class="section-title">Tankkausloki</div>`;
      [...fuelings].sort((a,b)=>(b.mh||0)-(a.mh||0)).forEach(f => {
        html += `
        <div class="fuelrow">
          <div style="flex:1">
            <div class="fuelrow-date">${f.date||"–"}</div>
            <div class="fuelrow-sub">${f.mh?"⚙ "+f.mh+" h":""}${f.mh&&f.ppl?" · ":""}${f.ppl?f.ppl.toFixed(3)+" €/L":""}</div>
          </div>
          <div style="text-align:right">
            <div class="fuelrow-l">${(f.liters||0).toFixed(1)} L</div>
            <div class="fuelrow-tot">${f.total?f.total.toFixed(2)+" €":""}</div>
          </div>
          <button class="btn-del" onclick="deleteFueling('${f.id}')">✕</button>
        </div>`;
      });
      html += `</div>`;
    }
  }

  html += `</div>`;
  document.getElementById("app").innerHTML = html;

  // Attach live preview for uusi tab
  if(tab==="uusi") {
    ["fMhS","fMhE","fFuelM"].forEach(id => {
      const el = document.getElementById(id);
      if(el) el.addEventListener("input", updatePreview);
    });
    updatePreview();
  }

  // Tankkauslomakkeen live-laskenta
  if(showFuel) {
    ["fkL","fkPpl","fkTot"].forEach(id => {
      const el = document.getElementById(id);
      if(el) el.addEventListener("input", updateFuelingHint);
    });
    updateFuelingHint();
  }
}

function updatePreview() {
  const mhS = document.getElementById("fMhS");
  const mhE = document.getElementById("fMhE");
  const fFuelM = document.getElementById("fFuelM");
  const durBox = document.getElementById("durBox");
  const previewBox = document.getElementById("previewBox");
  if(!mhS||!mhE) return;

  const h = getH(mhS.value, mhE.value);
  if(h>0) {
    const rate = fFuelM&&fFuelM.value ? parseFloat(fFuelM.value) : cons;
    const f = (h*rate).toFixed(1);
    const nm2 = (h*25).toFixed(1);
    const afterFuel = Math.max(0, fuel-(h*rate)).toFixed(0);
    const afc = parseFloat(afterFuel)<50?"#E74C3C":"#2ECC71";

    durBox.className = "duration-box";
    durBox.innerHTML = `<div class="duration-txt">⏱ ${dur(h)}</div><div class="duration-sub">${Math.round(h*60)} min käyntiaikaa</div>`;

    previewBox.className = "preview-box";
    previewBox.innerHTML = `
      <div style="font-size:12px;color:#4A90B8;margin-bottom:10px">ESIKATSELU</div>
      <div class="preview-row">
        <div class="preview-item"><div class="preview-val" style="color:#E74C3C">${f} L</div><div class="preview-lbl">${rate} L/h</div></div>
        <div class="preview-item"><div class="preview-val" style="color:#4A90B8">${nm2} nm</div><div class="preview-lbl">arvio</div></div>
        <div class="preview-item"><div class="preview-val" style="color:#2ECC71">${dur(h)}</div><div class="preview-lbl">kesto</div></div>
      </div>
      <div class="preview-after">Tankki jälkeen: <span style="color:${afc};font-weight:700">${afterFuel} L</span></div>`;
  } else {
    if(durBox) durBox.className = "hidden";
    if(previewBox) previewBox.className = "hidden";
  }
}

function setTab(t) {
  if(t==="uusi" && tab!=="uusi") editId = null;
  tab = t;
  render();
}

function cancelForm() { editId = null; tab = "loki"; render(); }

function toggleFuel() { showFuel = !showFuel; showSettings = false; render(); }

function openSettings() { showSettings = true; showFuel = false; render(); }
function closeSettings() { showSettings = false; render(); }
function saveSettings() {
  const t = document.getElementById("setTitle").value.trim();
  const s = document.getElementById("setSub").value.trim();
  const tank = parseNum(document.getElementById("setTank").value);
  cfg.title = t || cfg.title;
  cfg.subtitle = s || cfg.subtitle;
  if(tank > 0) { cfg.tank = tank; TANK = tank; }
  persist();
  showSettings = false;
  render();
}

function updateFuelingHint() {
  const el = document.getElementById("fkHint"); if(!el) return;
  const L = parseNum(document.getElementById("fkL").value);
  const ppl = parseNum(document.getElementById("fkPpl").value);
  const tot = parseNum(document.getElementById("fkTot").value);
  el.style.color = "#7A9AB5";
  if(L>0 && ppl>0 && tot<=0) el.textContent = `≈ yhteensä ${(L*ppl).toFixed(2)} €`;
  else if(L>0 && tot>0 && ppl<=0) el.textContent = `≈ ${(tot/L).toFixed(3)} €/L`;
  else if(L>0 && ppl>0 && tot>0) el.textContent = `${L} L × ${ppl} €/L = ${(L*ppl).toFixed(2)} €`;
  else el.textContent = "Täytä litrat ja joko €/L tai yhteensä €.";
}

function logFueling() {
  const date = document.getElementById("fkDate").value;
  const L = parseNum(document.getElementById("fkL").value);
  let mh = parseNum(document.getElementById("fkMh").value);
  let ppl = parseNum(document.getElementById("fkPpl").value);
  let tot = parseNum(document.getElementById("fkTot").value);
  const hint = document.getElementById("fkHint");
  if(L<=0) { if(hint){ hint.style.color="#E74C3C"; hint.textContent="❌ Anna tankatut litrat."; } return; }
  if(tot<=0 && ppl>0) tot = L*ppl;
  if(ppl<=0 && tot>0) ppl = tot/L;
  if(mh<=0) mh = latestMh();
  fuelings.push({id:"f"+Date.now(), date:date, mh:mh||0, liters:L, ppl:ppl||0, total:tot||0});
  fuel = Math.min(TANK, fuel+L);
  persist();
  showFuel = false;
  render();
}

function deleteFueling(id) {
  fuelings = fuelings.filter(f=>f.id!==id);
  persist();
  render();
}

function addFuelClick() {
  const v = parseFloat(document.getElementById("addFuelInp").value);
  if(!isNaN(v)&&v>0) { fuel = Math.min(TANK, fuel+v); persist(); showFuel=false; render(); }
}

function setFuelFull() { fuel = TANK; persist(); showFuel=false; render(); }

function setFuelDirect() {
  const v = parseFloat(document.getElementById("addFuelInp").value);
  if(!isNaN(v)&&v>=0) { fuel = Math.min(TANK,v); persist(); showFuel=false; render(); }
}

function updateCons(v) {
  const n = parseFloat(v);
  if(!isNaN(n)&&n>0) { cons=n; persist(); }
}

function saveLeg() {
  const fDate = document.getElementById("fDate").value;
  const fFrom = document.getElementById("fFrom").value.trim();
  const fTo = document.getElementById("fTo").value.trim();
  const fMhS = document.getElementById("fMhS").value;
  const fMhE = document.getElementById("fMhE").value;
  const fFuelM = document.getElementById("fFuelM").value.trim();
  const fNm = document.getElementById("fNm").value.trim();
  const fNotes = document.getElementById("fNotes").value.trim();

  const errors = [];
  if(!fFrom) errors.push("lähtösatama puuttuu");
  if(!fTo) errors.push("määräsatama puuttuu");
  if(!fMhS.trim()) errors.push("mittari lähtö puuttuu");
  if(!fMhE.trim()) errors.push("mittari tulo puuttuu");

  const errEl = document.getElementById("errMsg");
  if(errors.length>0) { errEl.className="errmsg"; errEl.textContent="❌ "+errors.join(", "); return; }

  const mhS = String(fMhS).replace(",",".").trim();
  const mhE = String(fMhE).replace(",",".").trim();
  const h = parseFloat(mhE)-parseFloat(mhS);
  if(h<=0) { errEl.className="errmsg"; errEl.textContent="❌ Tulo pitää olla suurempi kuin lähtö!"; return; }

  const rate = fFuelM ? parseFloat(fFuelM) : cons;
  const used = Math.round(h*rate*10)/10;
  const newLeg = {id:editId||"u"+Date.now(),date:fDate,from:fFrom,to:fTo,mhStart:mhS,mhEnd:mhE,nm:fNm,notes:fNotes,fuelManual:fFuelM};

  if(editId) {
    const old = legs.find(l=>l.id===editId);
    const oldUsed = old?legF(old):0;
    legs = legs.map(l=>l.id===editId?newLeg:l);
    fuel = Math.min(TANK,Math.max(0,fuel+oldUsed-used));
  } else {
    legs.push(newLeg);
    fuel = Math.max(0,fuel-used);
  }

  persist();
  editId = null;
  tab = "loki";
  render();
}

function editLeg(id) {
  editId = id;
  tab = "uusi";
  render();
}

function deleteLeg(id) {
  const l = legs.find(x=>x.id===id);
  if(l) { fuel = Math.min(TANK,fuel+legF(l)); persist(); }
  legs = legs.filter(x=>x.id!==id);
  persist();
  render();
}

// Init
load();
render();

// Service worker – offline-tuki
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("./sw.js").catch(function () {});
  });
}
</script>
