function t(k){ const d=STR[lang]||STR.fi; let v=(d&&k in d)?d[k]:STR.fi[k]; if(v==null) return k; if(typeof v==="function"){ return v.apply(null, Array.prototype.slice.call(arguments,1)); } return v; }
function setLang(l){ if(!STR[l]) return; lang=l; try{localStorage.setItem("vl5-lang",l);}catch(e){} try{document.documentElement.lang=l;}catch(e){} render(); }
function initLang(){ let s=null; try{s=localStorage.getItem("vl5-lang");}catch(e){} if(s&&STR[s]){ lang=s; } else { const n=(navigator.language||"fi").toLowerCase(); lang=n.indexOf("sv")===0?"sv":n.indexOf("en")===0?"en":"fi"; } try{document.documentElement.lang=lang;}catch(e){} }

  {id:"ef1",date:"2025-06-07",mh:10.0,liters:150,ppl:1.95,total:292.50,full:true,loc:"Naantali"},
  {id:"ef2",date:"2025-06-08",mh:13.1,liters:45,ppl:1.98,total:89.10,full:false,loc:"Nauvo"},

// State
let legs = [], fuelings = [], maint = [], fuel = 350, cons = DEF_CONS, consNm = 0, tab = "loki", editId = null, editFuelId = null, editMaintId = null, showFuel = false, showMaint = false, showSettings = false, logFilter = "all", statPeriod = "month", statYear = "all";
let cfg = { title: "Aquador 28C", subtitle: "Reittipäiväkirja", tank: 350 };

function load() {
  initLang();
  try { const v = localStorage.getItem("vl5-legs"); if(v) legs = JSON.parse(v); else legs = JSON.parse(JSON.stringify(HIST)); } catch { legs = JSON.parse(JSON.stringify(HIST)); }
  try { const v = localStorage.getItem("vl5-fuel"); if(v) fuel = parseFloat(v); } catch {}
  try { const v = localStorage.getItem("vl5-cons"); if(v) cons = parseFloat(v); } catch {}
  try { const v = localStorage.getItem("vl5-consnm"); if(v) consNm = parseFloat(v)||0; } catch {}
  try { const v = localStorage.getItem("vl5-fuelings"); if(v) fuelings = JSON.parse(v); else fuelings = JSON.parse(JSON.stringify(HIST_FUEL)); } catch { fuelings = JSON.parse(JSON.stringify(HIST_FUEL)); }
  try { const v = localStorage.getItem("vl5-maint"); if(v) maint = JSON.parse(v); } catch {}
  try { const v = localStorage.getItem("vl5-cfg"); if(v) cfg = Object.assign(cfg, JSON.parse(v)); else cfg.subtitle = t("routeLog"); } catch {}
  TANK = parseNum(cfg.tank) || 350;
}

function persist() {
  try { localStorage.setItem("vl5-legs", JSON.stringify(legs)); } catch {}
  try { localStorage.setItem("vl5-fuel", String(fuel)); } catch {}
  try { localStorage.setItem("vl5-cons", String(cons)); } catch {}
  try { localStorage.setItem("vl5-consnm", String(consNm)); } catch {}
  try { localStorage.setItem("vl5-fuelings", JSON.stringify(fuelings)); } catch {}
  try { localStorage.setItem("vl5-maint", JSON.stringify(maint)); } catch {}

function parseNum(s) { return parseFloat(String(s||"").replace(",",".").trim()) || 0; }
function esc(s) { return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function getH(s,e) { const h = parseNum(e)-parseNum(s); return h>0?h:0; }
function legH(l) { return getH(l.mhStart, l.mhEnd); }
function legF(l) {
  if(l.fuelManual && parseNum(l.fuelManual)>0) return Math.round(legH(l)*parseNum(l.fuelManual)*10)/10;   // per-etappi L/h
  if(l.fuelManualNm && parseNum(l.fuelManualNm)>0) return Math.round(legN(l)*parseNum(l.fuelManualNm)*10)/10; // per-etappi L/nm
  if(consNm>0) return Math.round(legN(l)*consNm*10)/10; // globaali L/nm
  return Math.round(legH(l)*cons*10)/10;                // globaali L/h
}
function legN(l) { return l.nm ? parseFloat(l.nm) : Math.round(legH(l)*25*10)/10; }
function dur(h) { const hh=Math.floor(h), mm=Math.round((h-hh)*60); if(hh===0)return mm+"min"; if(mm===0)return hh+"h"; return hh+"h "+mm+"min"; }
function fuelColor(pct) { return pct>50?"#2ECC71":pct>25?"#F39C12":"#E74C3C"; }
function fuelGaugeSVG(pct, fc) {
  const cx=60, cy=60, R=42, sw=9, A0=135, SWEEP=270;
  const p = Math.max(0, Math.min(100, pct));
  const pol = (rad, a) => { const t=a*Math.PI/180; return [cx+rad*Math.cos(t), cy+rad*Math.sin(t)]; };
  const arcSeg = (rad, a0, a1) => { const [x0,y0]=pol(rad,a0),[x1,y1]=pol(rad,a1); const d=((a1-a0)%360+360)%360; const large=d>180?1:0; return "M"+x0.toFixed(2)+" "+y0.toFixed(2)+" A"+rad+" "+rad+" 0 "+large+" 1 "+x1.toFixed(2)+" "+y1.toFixed(2); };
  const lerp = (a,b,t) => Math.round(a+(b-a)*t);
  function colorAt(t) {
    const RED=[231,76,60], YEL=[241,196,15], GRN=[46,204,113];
    let c;
    if(t<0.5){ const u=t/0.5; c=[lerp(RED[0],YEL[0],u),lerp(RED[1],YEL[1],u),lerp(RED[2],YEL[2],u)]; }
    else { const u=(t-0.5)/0.5; c=[lerp(YEL[0],GRN[0],u),lerp(YEL[1],GRN[1],u),lerp(YEL[2],GRN[2],u)]; }
    return "rgb("+c[0]+","+c[1]+","+c[2]+")";
  }
  // Koko väriasteikko taustalla; täyttynyt osuus (0→nykyinen) kirkkaana, loppu himmeänä
  const N=40;
  let segs="";
  for(let i=0;i<N;i++){
    const t0=i/N, t1=(i+1)/N, tm=(t0+t1)/2;
    const a0=A0+SWEEP*t0, a1=A0+SWEEP*t1+0.4;
    const filled = tm <= p/100;
    segs += `<path d="${arcSeg(R,a0,a1)}" fill="none" stroke="${colorAt(tm)}" stroke-width="${filled?sw:sw-2}" stroke-linecap="butt" opacity="${filled?1:0.25}"/>`;
  }
  const valA = A0 + SWEEP*p/100;
  const [px,py] = pol(R, valA);
  const pointer = `<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="5.5" fill="#fff" stroke="${colorAt(p/100)}" stroke-width="2.5" filter="url(#vlglow)"/>`;
  const [ex,ey]=pol(60,135), [fx,fy]=pol(60,45);
  return `<svg viewBox="0 0 120 120" class="gauge-svg">
    <defs><filter id="vlglow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="1.8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
    ${segs}
    ${pointer}
    <text x="${ex.toFixed(0)}" y="${(ey+4).toFixed(0)}" class="gauge-ef">E</text>
    <text x="${fx.toFixed(0)}" y="${(fy+4).toFixed(0)}" class="gauge-ef">F</text>
  </svg>`;
}
function latestMh() {
  let m = 0;
  legs.forEach(l => { const v = parseNum(l.mhEnd); if(v>m) m=v; });
  fuelings.forEach(f => { const v = parseNum(f.mh); if(v>m) m=v; });
  return m;
}
// Laskee tankin polttoaineen: viimeisestä TÄYDESTÄ tankkauksesta täysi tankki,
// miinus sen jälkeen ajetut tunnit × kulutus, plus mahdolliset vajaatankkaukset.
// Palauttaa null jos täysiä tankkauksia ei ole (silloin käytetään tallennettua arvoa).
function computeFuel() {
  const fulls = fuelings.filter(f => f.full && parseNum(f.mh)>0);
  if(fulls.length===0) return null;
  const refMh = parseNum(fulls.reduce((a,b) => parseNum(b.mh)>parseNum(a.mh)?b:a, fulls[0]).mh);
  // Summaa etappien oma kulutus refMh:n jälkeen (osittain refMh:n yli menevä etappi skaalataan)
  let used = 0;
  legs.forEach(l => {
    const e = parseNum(l.mhEnd), s = parseNum(l.mhStart);
    if(e > refMh) {
      if(s >= refMh) used += legF(l);
      else if(e>s) used += legF(l) * ((e - refMh) / (e - s));
    }
  });
  let level = TANK - used;
  fuelings.forEach(f => { if(parseNum(f.mh) > refMh && !f.full) level += (f.liters||0); });
  return Math.max(0, Math.min(TANK, level));
}
function totalH() { return legs.reduce((s,l)=>s+legH(l),0); }
function totalNm() { return legs.reduce((s,l)=>s+legN(l),0); }
function fuelPct() { return Math.min(100,Math.max(0,fuel/TANK*100)); }
function hoursSinceFull() {
  const fulls = fuelings.filter(f => f.full && parseNum(f.mh)>0);
  if(fulls.length===0) return null;
  const refMh = parseNum(fulls.reduce((a,b) => parseNum(b.mh)>parseNum(a.mh)?b:a, fulls[0]).mh);
  return Math.max(0, latestMh() - refMh);
}
function lastLeg() { return legs.length>0?legs[legs.length-1]:null; }
function lastHarbor() {
  if(!legs.length) return "";
  const sorted = [...legs].sort((a,b) =>
    ((Date.parse((a.date||"")+"T00:00:00")||0) - (Date.parse((b.date||"")+"T00:00:00")||0))
    || (parseNum(a.mhEnd) - parseNum(b.mhEnd)));
  return sorted[sorted.length-1].to || "";
}
function itemKey(date, sub) { const t = Date.parse((date||"")+"T00:00:00"); return (isNaN(t)?0:t) + (sub||0); }

// --- Tilastokaaviot ---
function setStatPeriod(p) { statPeriod = p; render(); }
function setStatYear(y) { statYear = y; render(); }
function statYears() {
  const set = new Set();
  fuelings.forEach(f => { if(f.date && f.date.length>=4) set.add(f.date.slice(0,4)); });
  legs.forEach(l => { if(l.date && l.date.length>=4) set.add(l.date.slice(0,4)); });
  return [...set].sort();
}
function realStats(yearKey) {
  const fz = yearKey==="all" ? fuelings : fuelings.filter(f => (f.date||"").slice(0,4)===yearKey);
  const lz = yearKey==="all" ? legs : legs.filter(l => (l.date||"").slice(0,4)===yearKey);
  const L = fz.reduce((s,f)=>s+(f.liters||0),0);
  const cost = fz.reduce((s,f)=>s+(f.total||0),0);
  const hrs = lz.reduce((s,l)=>s+legH(l),0);
  const nm = lz.reduce((s,l)=>s+legN(l),0);
  return { L, cost, hrs, nm };
}

function aggFuel(period) {
  const map = {};
  fuelings.forEach(f => {
    if(!f.date || f.date.length<7) return;
    const key = period==="year" ? f.date.slice(0,4) : f.date.slice(0,7);
    if(!map[key]) map[key] = { l:0, e:0 };
    map[key].l += (f.liters||0);
    map[key].e += (f.total||0);
  });
  return Object.keys(map).sort().map(k => ({ key:k, l:map[k].l, e:map[k].e }));
}
function periodLabel(key) {
  if(key.length===4) return key;                 // vuosi
  const [y,m] = key.split("-"); return parseInt(m)+"/"+y.slice(2); // 7/24
}
function barChartSVG(data, color) {
  if(!data.length) return '<div style="font-size:13px;color:#7A9AB5">'+t('noData')+'</div>';
  const n=data.length, bw=26, gap=12, padL=6, padR=6, padT=18, padB=22, H=120;
  const cw = padL+padR + n*bw + (n-1)*gap;
  const max = Math.max(...data.map(d=>d.value), 1);
  const chartH = H - padT - padB;
  let s = "";
  data.forEach((d,i) => {
    const x = padL + i*(bw+gap);
    const h = (d.value/max)*chartH;
    const y = padT + (chartH - h);
    const lbl = d.value>=100 ? Math.round(d.value) : Math.round(d.value*10)/10;
    s += `<rect x="${x}" y="${y.toFixed(1)}" width="${bw}" height="${Math.max(0,h).toFixed(1)}" rx="4" fill="${color}"/>`;
    s += `<text x="${(x+bw/2).toFixed(1)}" y="${(y-4).toFixed(1)}" text-anchor="middle" font-size="9" fill="#E8EFF5">${lbl}</text>`;
    s += `<text x="${(x+bw/2).toFixed(1)}" y="${H-8}" text-anchor="middle" font-size="9" fill="#7A9AB5">${d.label}</text>`;
  });
  return `<svg viewBox="0 0 ${cw} ${H}" style="width:100%;height:auto;display:block" preserveAspectRatio="xMidYMid meet">${s}</svg>`;
}

function harborCounts() {
  const map = {};
  legs.forEach(l => {
    [l.from, l.to].forEach(p => {
      const name = (p||"").trim();
      if(!name || name==="?") return;
      map[name] = (map[name]||0)+1;
    });
  });
  return Object.entries(map).map(([name,count]) => ({name,count})).sort((a,b)=>b.count-a.count);
}

// Likimääräiset koordinaatit SW-saaristolle (lat, lon). Voit korjata/lisätä vapaasti.
const GAZ = {
  "Naantali":[60.468,22.025], "Ruissalo":[60.435,22.170], "Turku":[60.448,22.265],
  "Nauvo":[60.193,21.905], "Korpoström":[60.103,21.585], "Houtskari Näsby":[60.230,21.365],
  "Mossala":[60.275,21.270], "Jurmo":[59.823,21.585], "Isokari":[60.717,21.027],
  "Uusikaupunki":[60.800,21.410], "Katanpää":[60.520,21.290], "Merimasku":[60.553,21.852],
  "Pensar":[60.300,22.060], "Vepsä":[60.335,22.100], "Sattmark":[60.265,22.110],
  "Lappo":[60.345,21.040], "Kumlinge":[60.262,20.780], "Sottunga":[60.130,20.670], "Kökar":[59.920,20.900]
};
function coordLookup(name) {
  const nm = (name||"").trim();
  if(!nm || nm==="?") return null;
  if(GAZ[nm]) return GAZ[nm];
  for(const k in GAZ) { if(nm.indexOf(k)>=0) return GAZ[k]; } // esim. "Kökar Brudhel" -> Kökar
  return null;
}
function mapSVG() {
  // Kerää tunnetut satamat ja reitit
  const counts = {};
  harborCounts().forEach(h => { const c=coordLookup(h.name); if(c) counts[h.name]=(counts[h.name]||0)+h.count; });
  const pts = Object.keys(counts).map(name => ({ name, c:coordLookup(name), n:counts[name] }));
  if(pts.length<2) return '<div style="font-size:13px;color:#7A9AB5">'+t('notEnoughPlaces')+'</div>';
  let minLat=99,maxLat=-99,minLon=999,maxLon=-999;
  pts.forEach(p => { minLat=Math.min(minLat,p.c[0]); maxLat=Math.max(maxLat,p.c[0]); minLon=Math.min(minLon,p.c[1]); maxLon=Math.max(maxLon,p.c[1]); });
  const W=340, H=300, pad=26;
  const midLat=(minLat+maxLat)/2, kx=Math.cos(midLat*Math.PI/180);
  const lonSpan=Math.max((maxLon-minLon)*kx, 0.001), latSpan=Math.max(maxLat-minLat, 0.001);
  const sc=Math.min((W-2*pad)/lonSpan, (H-2*pad)/latSpan);
  const offX=(W-lonSpan*sc)/2, offY=(H-latSpan*sc)/2;
  const proj = (lat,lon) => [ offX+((lon-minLon)*kx)*sc, offY+((maxLat-lat))*sc ];
  // reitit
  let lines="";
  legs.forEach(l => {
    const a=coordLookup(l.from), b=coordLookup(l.to);
    if(a&&b){ const [x1,y1]=proj(a[0],a[1]), [x2,y2]=proj(b[0],b[1]); lines+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#4A90B8" stroke-width="1.5" opacity="0.5"/>`; }
  });
  const maxN=Math.max(...pts.map(p=>p.n),1);
  let dots="", labels="";
  pts.forEach(p => {
    const [x,y]=proj(p.c[0],p.c[1]);
    const r=4+(p.n/maxN)*6;
    dots+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${r.toFixed(1)}" fill="#2ECC71" opacity="0.85" stroke="#0E2433" stroke-width="1.5"/>`;
    labels+=`<text x="${x.toFixed(1)}" y="${(y-r-3).toFixed(1)}" text-anchor="middle" font-size="9" fill="#E8EFF5">${esc(p.name)}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;background:rgba(74,144,184,0.06);border-radius:10px">${lines}${dots}${labels}</svg>`;
}

    <button class="tab ${tab==='uusi'?'active':''}" onclick="setTab('uusi')">${t('tabNew')}</button>
    <button class="tab ${tab==='huolto'?'active':''}" onclick="setTab('huolto')">${t('tabService')}</button>
    <button class="tab ${tab==='tilasto'?'active':''}" onclick="setTab('tilasto')">${t('tabStats')}</button>
  </div>
  <div class="content">`;

  if(tab==="loki") {
    // Suodatin: kaikki / etapit / tankkaukset
    html += `<div class="logfilter">
      <button class="${logFilter==='all'?'active':''}" onclick="setFilter('all')">${t('all')}</button>
      <button class="${logFilter==='legs'?'active':''}" onclick="setFilter('legs')">${t('legs')}</button>
      <button class="${logFilter==='fuel'?'active':''}" onclick="setFilter('fuel')">${t('fuelings')}</button>
    </div>`;

    // Yhdistetty aikajana: etapit + tankkaukset, järjestys käyntiajan (mittarilukeman) mukaan, uusin ensin
    const items = [];
    legs.forEach(l => items.push({t:"leg", d:l, k:parseNum(l.mhEnd)}));
    fuelings.forEach(f => items.push({t:"fuel", d:f, k:(f.mh?parseNum(f.mh):lmh)+0.001}));
    items.sort((a,b)=> b.k - a.k);
    const shown = logFilter==="legs" ? items.filter(it=>it.t==="leg")
                : logFilter==="fuel" ? items.filter(it=>it.t==="fuel")
                : items;

    if(shown.length===0) {
      const msg = logFilter==="fuel" ? t('noFuelings') : logFilter==="legs" ? t('noLegs') : t('noEntries');
      html += `<div class="empty"><div class="empty-icon">⚓</div><div>${msg}</div></div>`;
    } else {
      shown.forEach(it => {
        if(it.t==="leg") {
          const leg=it.d, h=legH(leg), f=legF(leg), n=legN(leg);
          html += `
          <div class="leg">
            <div class="leg-head">
              <span class="leg-route2">${leg.from} → ${leg.to}</span>
              <span class="leg-d">${leg.date}</span>
              <span class="leg-acts">
                <button class="btn-edit" onclick="editLeg('${leg.id}')">✏️</button>
                <button class="btn-del" onclick="deleteLeg('${leg.id}')">✕</button>
              </span>
            </div>
            <div class="leg-meta">
              <span>⏱ <b>${dur(h)}</b></span>
              <span>⛽ <b>${f} L</b></span>
              <span>🧭 <b>${n} nm</b>${leg.nm?'':` <span style="opacity:.6">(${t('estimate')})</span>`}</span>
              <span>⚙ <b>${leg.mhStart}–${leg.mhEnd}</b></span>
            </div>
            ${leg.notes?`<div class="leg-note2">${leg.notes}</div>`:''}
          </div>`;
        } else {
          const f=it.d;
          html += `
          <div class="leg fuelcard">
            <div class="leg-head">
              <span class="leg-route2">${t('fuelingCard')}</span>
              <span class="leg-d">${f.date||""}</span>
              <span class="leg-acts">
                <button class="btn-edit" onclick="startEditFuel('${f.id}')">✏️</button>
                <button class="btn-del" onclick="deleteFueling('${f.id}')">✕</button>
              </span>
            </div>
            <div class="leg-meta">
              ${f.loc?`<span>📍 ${esc(f.loc)}</span>`:''}
              <span>🛢 <b>${(f.liters||0).toFixed(1)} L</b>${f.full?` <span style="opacity:.6">(${t('full')})</span>`:''}</span>
              ${f.mh?`<span>⚙ <b>${f.mh} h</b></span>`:''}
              ${f.ppl?`<span><b>${f.ppl.toFixed(3)} €/L</b></span>`:''}
              ${f.total?`<span>💶 <b>${f.total.toFixed(2)} €</b></span>`:''}
            </div>
          </div>`;
        }
      });
    }
  }

  if(tab==="uusi") {
    const ll = editId ? legs.find(l=>l.id===editId) : null;
    const defDate = ll ? ll.date : new Date().toISOString().slice(0,10);
    const defFrom = ll ? ll.from : (lastLeg()?lastLeg().to:"");
    const defTo = ll ? ll.to : "";
    const defMhS = ll ? ll.mhStart : lmh.toFixed(1);
    const defMhE = ll ? ll.mhEnd : "";
    const defNm = ll ? ll.nm : "";
    const defNotes = ll ? ll.notes : "";
    const defFuelM = ll ? (ll.fuelManual||"") : "";
    const defFuelMNm = ll ? (ll.fuelManualNm||"") : "";

    html += `
    <div class="card" style="padding:20px">
      <div style="font-size:16px;font-weight:700;color:#4A90B8;margin-bottom:16px">${editId?t('editLeg'):t('newLeg')}</div>
      <label>${t('date')}</label>
      <input type="date" id="fDate" value="${defDate}">
      <div class="grid2">
        <div><label>${t('fromHarbor')}</label><input type="text" id="fFrom" value="${defFrom}" placeholder="${t('fromHarbor')}"></div>
        <div><label>${t('toHarbor')}</label><input type="text" id="fTo" value="${defTo}" placeholder="${t('toHarbor')}"></div>
      </div>
      <div class="grid2">
        <div><label>${t('meterStart')}</label><input type="text" inputmode="decimal" id="fMhS" value="${defMhS}" placeholder="${lmh.toFixed(1)}"></div>
        <div><label>${t('meterEnd')}</label><input type="text" inputmode="decimal" id="fMhE" value="${defMhE}" placeholder="${t('phMeterEnd')}"></div>
      </div>
      <label>${t('consPerLeg')}</label>
      <div class="grid2">
        <div><label style="font-size:11px;color:#7A9AB5">${t('lhHint')}</label>
          <input type="text" inputmode="decimal" id="fFuelM" value="${defFuelM}" placeholder="${t('eg')} ${cons}"></div>
        <div><label style="font-size:11px;color:#7A9AB5">${t('lnmHint')}</label>
          <input type="text" inputmode="decimal" id="fFuelMNm" value="${defFuelMNm}" placeholder="${t('eg')} ${consNm||2}"></div>
      </div>
      <div style="font-size:11px;color:#7A9AB5;margin-top:4px">${t('priorityNote', consNm>0?consNm+' L/nm':cons+' L/h')}</div>
      <div id="durBox" class="hidden"></div>
      <label>${t('distanceNm')}</label>
      <input type="text" inputmode="decimal" id="fNm" value="${defNm}" placeholder="${t('phAutoCalc')}">
      <label>${t('notes')}</label>
      <textarea id="fNotes" rows="3" placeholder="${t('phNotes')}">${defNotes}</textarea>
      <div id="previewBox" class="hidden"></div>
      <div id="errMsg" class="hidden errmsg"></div>
      <button class="btn-save" onclick="saveLeg()">💾 ${editId?t('saveChanges'):t('saveLegBtn')}</button>
      <button class="btn-cancel" onclick="cancelForm()">${t('cancel')}</button>
    </div>`;
  }

  if(tab==="tilasto") {
    const th = totalH(), tn = totalNm(), lm = latestMh();
    // Todellinen kulutus & kustannukset — per kausi/vuosi + kaikki
    const years = statYears();
    if(statYear!=="all" && !years.includes(statYear)) statYear = "all";
    const rs = realStats(statYear);
    const r_avgPpl = rs.L>0 && rs.cost>0 ? rs.cost/rs.L : 0;
    const r_cons = rs.hrs>0 && rs.L>0 ? rs.L/rs.hrs : 0;
    const r_cph = rs.hrs>0 && rs.cost>0 ? rs.cost/rs.hrs : 0;
    const r_cpnm = rs.nm>0 && rs.cost>0 ? rs.cost/rs.nm : 0;
    const r_lpnm = rs.nm>0 && rs.L>0 ? rs.L/rs.nm : 0;
    let yrBtns = years.map(y => `<button class="${statYear===y?'active':''}" style="flex:none;padding:6px 11px" onclick="setStatYear('${y}')">${y}</button>`).join("");
    yrBtns += `<button class="${statYear==='all'?'active':''}" style="flex:none;padding:6px 11px" onclick="setStatYear('all')">${t('all')}</button>`;
    html += `<div class="card" style="margin-bottom:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px">
        <div class="section-title" style="margin:0">${t('realConsTitle')}</div>
        ${years.length>1?`<div class="logfilter" style="margin:0;width:auto;flex-wrap:wrap">${yrBtns}</div>`:""}
      </div>`;
    if(fuelings.length===0) {
      html += `<div style="font-size:13px;color:#7A9AB5">${t('addFuelingsHint')}</div>`;
    } else {
      html += `
      <div class="kv-row"><span class="kv-lbl">${t('fueledTotal')}</span><span class="kv-val">${rs.L.toFixed(0)} L</span></div>
      <div class="kv-row"><span class="kv-lbl">${t('paidTotal')}</span><span class="kv-val">${rs.cost>0?rs.cost.toFixed(2)+" €":"–"}</span></div>
      <div class="kv-row"><span class="kv-lbl">${t('avgPrice')}</span><span class="kv-val">${r_avgPpl>0?r_avgPpl.toFixed(3)+" €/L":"–"}</span></div>
      <div class="kv-row"><span class="kv-lbl">${t('engineHours')}</span><span class="kv-val">${rs.hrs.toFixed(1)} h</span></div>
      <div class="kv-row"><span class="kv-lbl">${t('distance')}</span><span class="kv-val">${rs.nm.toFixed(0)} nm</span></div>
      <div class="kv-row"><span class="kv-lbl">${t('actualCons')}</span><span class="kv-val" style="color:#4A90B8">${r_cons>0?r_cons.toFixed(1)+" L/h":"–"}</span></div>
      <div class="kv-row"><span class="kv-lbl">${t('consPerNm')}</span><span class="kv-val">${r_lpnm>0?r_lpnm.toFixed(2)+" L/nm":"–"}</span></div>
      <div class="kv-row"><span class="kv-lbl">${t('costPerH')}</span><span class="kv-val">${r_cph>0?r_cph.toFixed(2)+" €/h":"–"}</span></div>
      <div class="kv-row"><span class="kv-lbl">${t('costPerNm')}</span><span class="kv-val">${r_cpnm>0?r_cpnm.toFixed(2)+" €/nm":"–"}</span></div>
      <div style="font-size:11px;color:#7A9AB5;margin-top:10px">${statYear==='all'?t('allSeasons'):t('seasonOf',statYear)} ${t('realConsExplain')}</div>`;
    }
    html += `</div>`;
    html += `
    <div class="stat-grid">
      <div class="card big-stat" style="margin-bottom:0"><div class="big-stat-icon">⛵</div><div class="big-stat-lbl">${t('bigLegs')}</div><div class="big-stat-val">${legs.length} ${t('pcs')}</div></div>
      <div class="card big-stat" style="margin-bottom:0"><div class="big-stat-icon">🧭</div><div class="big-stat-lbl">${t('totalDistance')}</div><div class="big-stat-val">${tn.toFixed(0)} nm</div></div>
      <div class="card big-stat" style="margin-bottom:0"><div class="big-stat-icon">⏱️</div><div class="big-stat-lbl">${t('engineHoursShort')}</div><div class="big-stat-val">${th.toFixed(1)} h</div></div>
      <div class="card big-stat" style="margin-bottom:0"><div class="big-stat-icon">⚙️</div><div class="big-stat-lbl">${t('meterReading')}</div><div class="big-stat-val">${lm.toFixed(1)} h</div></div>
    </div>
    <div class="card" style="margin-top:12px;padding:20px">
      <div class="section-title">${t('consSetting')}</div>
      <div class="flex-row">
        <input type="number" step="0.5" value="${cons}" onchange="updateCons(this.value)" style="width:90px;background:rgba(255,255,255,0.07);border:1px solid rgba(74,144,184,0.35);border-radius:8px;padding:12px;color:#E8EFF5;font-size:20px;font-weight:700;text-align:center;color-scheme:dark">
        <span style="font-size:15px;color:#7A9AB5">${t('lhDefault')}</span>
      </div>
      <div class="flex-row" style="margin-top:10px">
        <input type="number" step="0.1" value="${consNm||''}" onchange="updateConsNm(this.value)" placeholder="0" style="width:90px;background:rgba(255,255,255,0.07);border:1px solid rgba(74,144,184,0.35);border-radius:8px;padding:12px;color:#E8EFF5;font-size:20px;font-weight:700;text-align:center;color-scheme:dark">
        <span style="font-size:15px;color:#7A9AB5">${t('lnmAlt')}</span>
      </div>
      <div style="font-size:11px;color:#7A9AB5;margin-top:10px">${t('consSettingNote')}</div>
    </div>
    <div class="card">
      <div class="section-title">${t('averages')}</div>
      <div class="kv-row"><span class="kv-lbl">${t('consPerH')}</span><span class="kv-val">${cons} L/h</span></div>
      <div class="kv-row"><span class="kv-lbl">${t('rangeHoursOnTank')}</span><span class="kv-val">~${Math.round(fuel/cons)} h</span></div>
      <div class="kv-row"><span class="kv-lbl">${t('rangeNmOnTank')}</span><span class="kv-val">~${Math.round(fuel/cons*25)} nm</span></div>
    </div>`;

    // Kulutus täydeltä täydelle: vain "tankki täyteen" -tankkaukset ovat luotettavia kalibrointipisteitä.
    // Välillä = kaikki tankatut litrat (myös lisätankkaukset) kahden täyden tankin välillä ÷ käyntiaika.
    const fulls = fuelings.filter(f=>f.full && f.mh>0).sort((a,b)=>a.mh-b.mh);
    const allf = fuelings.filter(f=>f.mh>0).sort((a,b)=>a.mh-b.mh);
    const burnedBetween = (loMh, hiMh) => allf.filter(f=>f.mh>loMh && f.mh<=hiMh).reduce((s,f)=>s+(f.liters||0),0);
    let lastCons=0, lastBurn=0, lastHrs=0, allCons=0, allBurn=0, allHrs=0;
    if(fulls.length>=2) {
      const a=fulls[fulls.length-2], b=fulls[fulls.length-1];
      lastHrs = b.mh - a.mh; lastBurn = burnedBetween(a.mh, b.mh);
      if(lastHrs>0) lastCons = lastBurn/lastHrs;
      const f0=fulls[0], fn=fulls[fulls.length-1];
      allHrs = fn.mh - f0.mh; allBurn = burnedBetween(f0.mh, fn.mh);
      if(allHrs>0) allCons = allBurn/allHrs;
    }
    html += `
    <div class="card">
      <div class="section-title">${t('consFromIntervals')}</div>`;
    if(fulls.length<2) {
      html += `<div style="font-size:13px;color:#7A9AB5">${t('needTwoFulls')}</div>`;
    } else {
      html += `
      <div class="kv-row"><span class="kv-lbl">${t('lastInterval')}<br><span style="font-size:11px;opacity:.7">${lastBurn.toFixed(0)} L ÷ ${lastHrs.toFixed(1)} h</span></span><span class="kv-val" style="color:#2ECC71">${lastCons>0?lastCons.toFixed(1)+" L/h":"–"}</span></div>
      <div class="kv-row"><span class="kv-lbl">${t('allFullIntervals')}<br><span style="font-size:11px;opacity:.7">${allBurn.toFixed(0)} L ÷ ${allHrs.toFixed(1)} h</span></span><span class="kv-val" style="color:#2ECC71">${allCons>0?allCons.toFixed(1)+" L/h":"–"}</span></div>
      <div style="font-size:11px;color:#7A9AB5;margin-top:10px">${t('fullToFullNote')}</div>`;
    }
    html += `</div>`;

    // Tankkausloki
    if(fuelings.length>0) {
      html += `<div class="card"><div class="section-title">${t('fuelingLog')}</div>`;
      [...fuelings].sort((a,b)=>(b.mh||0)-(a.mh||0)).forEach(f => {
        html += `
        <div class="fuelrow">
          <div style="flex:1">
            <div class="fuelrow-date">${f.date||"–"}</div>
            <div class="fuelrow-sub">${f.mh?"⚙ "+f.mh+" h":""}${f.mh&&f.ppl?" · ":""}${f.ppl?f.ppl.toFixed(3)+" €/L":""}${f.loc?((f.mh||f.ppl)?" · ":"")+"📍 "+esc(f.loc):""}</div>
          </div>
          <div style="text-align:right">
            <div class="fuelrow-l">${(f.liters||0).toFixed(1)} L</div>
            <div class="fuelrow-tot">${f.total?f.total.toFixed(2)+" €":""}</div>
          </div>
          <button class="btn-del" onclick="deleteFueling('${f.id}')">✕</button>
        </div>`;
      });
      html += `</div>`;
    }

    // --- Kaaviot: litrat & € per kk/vuosi ---
    const agg = aggFuel(statPeriod);
    const litData = agg.map(a => ({ label:periodLabel(a.key), value:a.l }));
    const eurData = agg.map(a => ({ label:periodLabel(a.key), value:a.e }));
    html += `
    <div class="card">
      <div style="display:flex;align-items:center;margin-bottom:12px">
        <div class="section-title" style="margin:0">${t('fuelingsAndCosts')}</div>
        <div class="logfilter" style="margin:0 0 0 auto;width:auto">
          <button class="${statPeriod==='month'?'active':''}" style="flex:none;padding:6px 12px" onclick="setStatPeriod('month')">${t('month')}</button>
          <button class="${statPeriod==='year'?'active':''}" style="flex:none;padding:6px 12px" onclick="setStatPeriod('year')">${t('year')}</button>
        </div>
      </div>
      <div style="font-size:12px;color:#7A9AB5;margin-bottom:4px">${t('fueledLiters')}</div>
      ${barChartSVG(litData, "#4A90B8")}
      <div style="font-size:12px;color:#7A9AB5;margin:14px 0 4px">${t('costsEur')}</div>
      ${barChartSVG(eurData, "#2ECC71")}
    </div>`;

    // --- Eniten käydyt satamat ---
    const harbors = harborCounts().slice(0, 10);
    if(harbors.length>0) {
      const hmax = harbors[0].count;
      html += `<div class="card"><div class="section-title">${t('topHarbors')}</div>`;
      harbors.forEach(h => {
        const w = Math.round((h.count/hmax)*100);
        html += `
        <div style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px"><span>${esc(h.name)}</span><span style="color:#7A9AB5">${h.count}×</span></div>
          <div style="background:rgba(255,255,255,0.06);border-radius:5px;height:8px;overflow:hidden"><div style="width:${w}%;height:100%;background:#4A90B8;border-radius:5px"></div></div>
        </div>`;
      });
      html += `</div>`;
    }

    // --- Kartta + reitit ---
    html += `
    <div class="card">
      <div class="section-title">${t('mapRoutes')}</div>
      ${mapSVG()}
      <div style="font-size:11px;color:#7A9AB5;margin-top:8px">${t('mapNote')}</div>
    </div>`;
  }

  if(tab==="huolto") {
    const em = editMaintId ? maint.find(m=>m.id===editMaintId) : null;
    const mDate = em ? (em.date||new Date().toISOString().slice(0,10)) : new Date().toISOString().slice(0,10);
    const totM = maint.reduce((s,m)=>s+(m.cost||0),0);
    // Lisää/muokkaa-nappi tai lomake
    if(showMaint) {
      html += `
      <div class="card" style="padding:20px">
        <div style="display:flex;align-items:center;margin-bottom:12px">
          <div style="font-size:16px;font-weight:700;color:#4A90B8">🔧 ${em?t('editService'):t('newService')}</div>
          <button class="btn-close" style="margin-left:auto" onclick="toggleMaint()">✕ ${t('close')}</button>
        </div>
        <label>${t('date')}</label>
        <input type="date" id="mDate" value="${mDate}">
        <label>${t('serviceDesc')}</label>
        <textarea id="mDesc" rows="3" placeholder="${t('phServiceDesc')}">${em?esc(em.desc):""}</textarea>
        <div class="grid2">
          <div><label>${t('priceEur')}</label><input type="text" inputmode="decimal" id="mCost" value="${em&&em.cost?em.cost:""}" placeholder="${t('phPrice250')}"></div>
          <div><label>${t('doneBy')}</label><input type="text" id="mBy" value="${em?esc(em.by||""):""}" placeholder="${t('phDoneBy')}"></div>
        </div>
        <div id="mErr" class="hidden errmsg"></div>
        <button class="btn-save" style="margin-top:12px" onclick="saveMaint()">💾 ${em?t('saveChanges'):t('saveServiceBtn')}</button>
        <button class="btn-cancel" onclick="toggleMaint()">${t('cancel')}</button>
      </div>`;
    } else {
      html += `<button class="btn-save" style="margin:0 0 12px" onclick="toggleMaint()">${t('addService')}</button>`;
    }
    // Yhteenveto
    if(maint.length>0) {
      html += `<div class="card"><div class="kv-row"><span class="kv-lbl">${t('servicesLogged')}</span><span class="kv-val">${maint.length} ${t('pcs')}</span></div><div class="kv-row"><span class="kv-lbl">${t('costsTotal')}</span><span class="kv-val" style="color:#4A90B8">${totM>0?totM.toFixed(2)+" €":"–"}</span></div></div>`;
    }
    // Lista
    html += `<div class="card"><div class="section-title">${t('serviceHistory')}</div>`;
    if(maint.length===0) {
      html += `<div style="font-size:13px;color:#7A9AB5">${t('noServices')}</div>`;
    } else {
      [...maint].sort((a,b)=>itemKey(b.date)-itemKey(a.date)).forEach(m => {
        html += `
        <div class="leg">
          <div class="leg-top">
            <div class="leg-route" style="font-size:15px">🔧 ${m.date||t('service')}</div>
            <span class="leg-acts">
              <button class="btn-edit" onclick="startEditMaint('${m.id}')">✏️</button>
              <button class="btn-del" onclick="deleteMaint('${m.id}')">✕</button>
            </span>
          </div>
          <div style="white-space:pre-wrap;font-size:14px;line-height:1.5;margin:4px 0 7px;color:#E8EFF5">${esc(m.desc)}</div>
          <div class="leg-meta">
            ${m.cost?`<span>💶 ${m.cost.toFixed(2)} €</span>`:""}
            ${m.by?`<span>👤 ${esc(m.by)}</span>`:""}
            ${!m.cost&&!m.by?`<span style="color:#7A9AB5">—</span>`:""}
          </div>
        </div>`;
      });
    }
    html += `</div>`;
  }

  html += `</div>`;
  document.getElementById("app").innerHTML = html;
  try { document.title = (cfg.title||"Veneloki") + " — " + t("routeLog"); } catch(e) {}

  // Attach live preview for uusi tab
  if(tab==="uusi") {
    ["fMhS","fMhE","fFuelM","fFuelMNm","fNm"].forEach(id => {
      const el = document.getElementById(id);
      if(el) el.addEventListener("input", updatePreview);
    });
    updatePreview();
  }

  // Tankkauslomakkeen live-laskenta
  if(showFuel) {
    ["fkL","fkPpl","fkTot"].forEach(id => {
      const el = document.getElementById(id);
      if(el) el.addEventListener("input", updateFuelingHint);
    });
    updateFuelingHint();
  }
}

function updatePreview() {
  const mhS = document.getElementById("fMhS");
  const mhE = document.getElementById("fMhE");
  const fFuelM = document.getElementById("fFuelM");
  const durBox = document.getElementById("durBox");
  const previewBox = document.getElementById("previewBox");
  if(!mhS||!mhE) return;

  const h = getH(mhS.value, mhE.value);
  if(h>0) {
    const fFuelMNmEl = document.getElementById("fFuelMNm");
    const nmVal = document.getElementById("fNm") ? parseNum(document.getElementById("fNm").value) : 0;
    let f, rate;
    if(fFuelM && parseNum(fFuelM.value)>0) {
      rate = parseNum(fFuelM.value); f = (h*rate).toFixed(1);
    } else if(fFuelMNmEl && parseNum(fFuelMNmEl.value)>0 && nmVal>0) {
      rate = parseNum(fFuelMNmEl.value); f = (nmVal*rate).toFixed(1);
    } else if(consNm>0 && nmVal>0) {
      f = (nmVal*consNm).toFixed(1);
    } else {
      f = (h*cons).toFixed(1);
    }
    const nm2 = (h*25).toFixed(1);
    const afterFuel = Math.max(0, fuel-parseFloat(f)).toFixed(0);
    const afc = parseFloat(afterFuel)<50?"#E74C3C":"#2ECC71";

    durBox.className = "duration-box";
    durBox.innerHTML = `<div class="duration-txt">⏱ ${dur(h)}</div><div class="duration-sub">${t('minEngineTime', Math.round(h*60))}</div>`;

    previewBox.className = "preview-box";
    previewBox.innerHTML = `
      <div style="font-size:12px;color:#4A90B8;margin-bottom:10px">${t('preview')}</div>
      <div class="preview-row">
        <div class="preview-item"><div class="preview-val" style="color:#E74C3C">${f} L</div><div class="preview-lbl">${rate} L/h</div></div>
        <div class="preview-item"><div class="preview-val" style="color:#4A90B8">${nm2} nm</div><div class="preview-lbl">${t('estimate')}</div></div>
        <div class="preview-item"><div class="preview-val" style="color:#2ECC71">${dur(h)}</div><div class="preview-lbl">${t('duration')}</div></div>
      </div>
      <div class="preview-after">${t('tankAfter')} <span style="color:${afc};font-weight:700">${afterFuel} L</span></div>`;
  } else {
    if(durBox) durBox.className = "hidden";
    if(previewBox) previewBox.className = "hidden";
  }
}

function setTab(t) {
  if(t==="uusi" && tab!=="uusi") editId = null;
  if(t!=="huolto") { showMaint = false; editMaintId = null; }
  tab = t;
  render();
}

function toggleMaint() { showMaint = !showMaint; editMaintId = null; render(); }
function startEditMaint(id) { editMaintId = id; showMaint = true; render(); }
function deleteMaint(id) {
  if(!confirm(t('confirmDelService'))) return;
  maint = maint.filter(m => m.id !== id);
  persist(); render();
}
function saveMaint() {
  const date = document.getElementById("mDate").value;
  const desc = document.getElementById("mDesc").value.trim();
  const cost = parseNum(document.getElementById("mCost").value);
  const by = document.getElementById("mBy").value.trim();
  const err = document.getElementById("mErr");
  if(!desc) { err.textContent = t('errServiceDesc'); err.classList.remove("hidden"); return; }
  if(editMaintId) {
    maint = maint.map(m => m.id===editMaintId ? {id:m.id, date:date, desc:desc, cost:cost||0, by:by} : m);
    editMaintId = null;
  } else {
    maint.push({ id:"m"+Date.now(), date:date, desc:desc, cost:cost||0, by:by });
  }
  showMaint = false;
  persist(); render();
}

function setFilter(f) { logFilter = f; render(); }

function cancelForm() { editId = null; tab = "loki"; render(); }

function toggleFuel() { showFuel = !showFuel; showSettings = false; editFuelId = null; render(); }
function startEditFuel(id) { editFuelId = id; showFuel = true; showSettings = false; render(); }

function openSettings() { showSettings = true; showFuel = false; render(); }
function closeSettings() { showSettings = false; render(); }
function saveSettings() {
  const t = document.getElementById("setTitle").value.trim();
  const s = document.getElementById("setSub").value.trim();
  const tank = parseNum(document.getElementById("setTank").value);
  cfg.title = t || cfg.title;
  cfg.subtitle = s || cfg.subtitle;
  if(tank > 0) { cfg.tank = tank; TANK = tank; }
  persist();
  showSettings = false;
  render();
}

function clearPhoto() { cfg.photo = ""; persist(); render(); }
function photoChosen(input) {
  const file = input.files && input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = new Image();
    img.onload = function() {
      const maxW = 520;
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      try {
        cfg.photo = canvas.toDataURL("image/jpeg", 0.82);
        persist();
        render();
      } catch(err) { alert(t('errPhotoProcess')); }
    };
    img.onerror = function() { alert(t('errPhotoRead')); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function exportData() {
  const data = { app:"Veneloki", v:1, exported:new Date().toISOString(), cfg:cfg, fuel:fuel, cons:cons, consNm:consNm, legs:legs, fuelings:fuelings, maint:maint };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const name = (cfg.title||"veneloki").replace(/[^a-zA-Z0-9]+/g,"-").replace(/^-+|-+$/g,"").toLowerCase() || "veneloki";
  a.href = url;
  a.download = name + "-varmuuskopio-" + new Date().toISOString().slice(0,10) + ".json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
}

function importFileChosen(input) {
  const file = input.files && input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if(!data || (!Array.isArray(data.legs) && !Array.isArray(data.fuelings))) {
        alert(t('errNotBackup'));
        input.value = ""; return;
      }
      if(!confirm(t('confirmImport'))) {
        input.value = ""; return;
      }
      if(Array.isArray(data.legs)) legs = data.legs;
      if(Array.isArray(data.fuelings)) fuelings = data.fuelings;
      if(Array.isArray(data.maint)) maint = data.maint;
      if(typeof data.fuel === "number") fuel = data.fuel;
      if(typeof data.cons === "number") cons = data.cons;
      if(typeof data.consNm === "number") consNm = data.consNm;
      if(data.cfg && typeof data.cfg === "object") { cfg = Object.assign(cfg, data.cfg); TANK = parseNum(cfg.tank) || TANK; }
      persist();
      showSettings = false;
      render();
      alert(t('importOk'));
    } catch(err) {
      alert(t('errImport'));
    }
    input.value = "";
  };
  reader.readAsText(file);
}

function updateFuelingHint() {
  const el = document.getElementById("fkHint"); if(!el) return;
  const L = parseNum(document.getElementById("fkL").value);
  const ppl = parseNum(document.getElementById("fkPpl").value);
  const tot = parseNum(document.getElementById("fkTot").value);
  el.style.color = "#7A9AB5";
  if(L>0 && ppl>0 && tot<=0) el.textContent = t('approxTotal', (L*ppl).toFixed(2));
  else if(L>0 && tot>0 && ppl<=0) el.textContent = `≈ ${(tot/L).toFixed(3)} €/L`;
  else if(L>0 && ppl>0 && tot>0) el.textContent = `${L} L × ${ppl} €/L = ${(L*ppl).toFixed(2)} €`;
  else el.textContent = t('fillLitersHint');
}

function calcFuelPrice(src) {
  const Lel = document.getElementById("fkL"), pEl = document.getElementById("fkPpl"), tEl = document.getElementById("fkTot");
  if(!Lel || !pEl || !tEl) return;
  const L = parseNum(Lel.value), ppl = parseNum(pEl.value), tot = parseNum(tEl.value);
  if(L<=0) return;
  if(src==="ppl") { if(ppl>0) tEl.value = (L*ppl).toFixed(2); }
  else if(src==="tot") { if(tot>0) pEl.value = (tot/L).toFixed(3); }
  else { // litramäärä muuttui: päivitä riippuva arvo (€/L etusijalla)
    if(ppl>0) tEl.value = (L*ppl).toFixed(2);
    else if(tot>0) pEl.value = (tot/L).toFixed(3);
  }
}

function fullToggle() {
  const full = document.getElementById("fkFull").checked;
  const L = document.getElementById("fkL");
  const hint = document.getElementById("fkFullHint");
  if(full) {
    if(!L.value) L.value = (fuel < TANK ? Math.round(TANK-fuel) : "");
    hint.textContent = t('fullTankSet');
  } else {
    if(!editFuelId) L.value = "";
    hint.textContent = t('topUpHint');
  }
}

function logFueling() {
  const date = document.getElementById("fkDate").value;
  const L = parseNum(document.getElementById("fkL").value);
  let mh = parseNum(document.getElementById("fkMh").value);
  let ppl = parseNum(document.getElementById("fkPpl").value);
  let tot = parseNum(document.getElementById("fkTot").value);
  const full = document.getElementById("fkFull").checked;
  const locEl = document.getElementById("fkLoc");
  const loc = locEl ? locEl.value.trim() : "";
  const hint = document.getElementById("fkHint");
  if(L<=0) { if(hint){ hint.style.color="#E74C3C"; hint.textContent=t('errEnterLiters'); } return; }
  if(full && mh<=0) { if(hint){ hint.style.color="#E74C3C"; hint.textContent=t('errFullNeedsMeter'); } return; }
  if(mh<=0) mh = latestMh();
  if(tot<=0 && ppl>0) tot = L*ppl;
  if(ppl<=0 && tot>0) ppl = tot/L;
  if(editFuelId) {
    fuelings = fuelings.map(f => f.id===editFuelId ? {id:f.id, date:date, mh:mh||0, liters:L, ppl:ppl||0, total:tot||0, full:full, loc:loc} : f);
    editFuelId = null;
  } else {
    fuelings.push({id:"f"+Date.now(), date:date, mh:mh||0, liters:L, ppl:ppl||0, total:tot||0, full:full, loc:loc});
    fuel = full ? TANK : Math.min(TANK, fuel+L);
  }
  persist();
  showFuel = false;
  render();
}

function deleteFueling(id) {
  if(!confirm(t('confirmDelFueling'))) return;
  fuelings = fuelings.filter(f=>f.id!==id);
  persist();
  render();
}

function addFuelClick() {
  const v = parseFloat(document.getElementById("addFuelInp").value);
  if(!isNaN(v)&&v>0) { fuel = Math.min(TANK, fuel+v); persist(); showFuel=false; render(); }
}

function setFuelFull() { fuel = TANK; persist(); showFuel=false; render(); }

function setFuelDirect() {
  const v = parseFloat(document.getElementById("addFuelInp").value);
  if(!isNaN(v)&&v>=0) { fuel = Math.min(TANK,v); persist(); showFuel=false; render(); }
}

function updateCons(v) {
  const n = parseFloat(v);
  if(!isNaN(n)&&n>0) { cons=n; persist(); render(); }
}
function updateConsNm(v) {
  const n = parseFloat(v);
  consNm = (!isNaN(n)&&n>0) ? n : 0;
  persist();
  render();
}

function saveLeg() {
  const fDate = document.getElementById("fDate").value;
  const fFrom = document.getElementById("fFrom").value.trim();
  const fTo = document.getElementById("fTo").value.trim();
  const fMhS = document.getElementById("fMhS").value;
  const fMhE = document.getElementById("fMhE").value;
  const fFuelM = document.getElementById("fFuelM").value.trim();
  const fFuelMNm = document.getElementById("fFuelMNm").value.trim();
  const fNm = document.getElementById("fNm").value.trim();
  const fNotes = document.getElementById("fNotes").value.trim();

  const errors = [];
  if(!fFrom) errors.push(t('errFromMissing'));
  if(!fTo) errors.push(t('errToMissing'));
  if(!fMhS.trim()) errors.push(t('errMeterStartMissing'));
  if(!fMhE.trim()) errors.push(t('errMeterEndMissing'));

  const errEl = document.getElementById("errMsg");
  if(errors.length>0) { errEl.className="errmsg"; errEl.textContent="❌ "+errors.join(", "); return; }

  const mhS = String(fMhS).replace(",",".").trim();
  const mhE = String(fMhE).replace(",",".").trim();
  const h = parseFloat(mhE)-parseFloat(mhS);
  if(h<=0) { errEl.className="errmsg"; errEl.textContent=t('errEndGtStart'); return; }

  const rate = fFuelM ? parseFloat(fFuelM) : cons;
  const used = Math.round(h*rate*10)/10;
  const newLeg = {id:editId||"u"+Date.now(),date:fDate,from:fFrom,to:fTo,mhStart:mhS,mhEnd:mhE,nm:fNm,notes:fNotes,fuelManual:fFuelM,fuelManualNm:fFuelMNm};

  if(editId) {
    const old = legs.find(l=>l.id===editId);
    const oldUsed = old?legF(old):0;
    legs = legs.map(l=>l.id===editId?newLeg:l);
    fuel = Math.min(TANK,Math.max(0,fuel+oldUsed-used));
  } else {
    legs.push(newLeg);
    fuel = Math.max(0,fuel-used);
  }

  persist();
  editId = null;
  tab = "loki";
  render();
}

function editLeg(id) {
  editId = id;
  tab = "uusi";
  render();
}

function deleteLeg(id) {
  if(!confirm(t('confirmDelLeg'))) return;
  const l = legs.find(x=>x.id===id);
  if(l) { fuel = Math.min(TANK,fuel+legF(l)); persist(); }
  legs = legs.filter(x=>x.id!==id);
  persist();
  render();
}

// Init
load();
render();

// Service worker – offline-tuki
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("./sw.js").catch(function () {});
  });
}
